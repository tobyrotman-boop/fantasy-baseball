

name: Weekly Fantasy Baseball Update

on:
  schedule:
    - cron: '0 11 * * *'  # Every day at 7am Pacific
  workflow_dispatch:  # Allows manual trigger from GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install espn-api

      - name: Run roto script
        env:
          ESPN_S2: ${{ secrets.ESPN_S2 }}
          SWID: ${{ secrets.SWID }}
        run: python3 roto.py

      - name: Run historical script
        env:
          ESPN_S2: ${{ secrets.ESPN_S2 }}
          SWID: ${{ secrets.SWID }}
        run: python3 historical.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add league_data.json historical.json
          git diff --staged --quiet || (git commit -m "Weekly data update" && git pull --rebase && git push)
